<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js TSL - Interstellar Ranger Perfected</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050608;
            font-family: sans-serif;
        }
        #loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-size: 1.2rem;
            pointer-events: none;
            text-shadow: 0 2px 5px rgba(0,0,0,1);
            letter-spacing: 1px;
        }
    </style>

    <!-- Import Map for Three.js r171 (WebGPU + TSL) -->
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.webgpu.js",
        "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.webgpu.js",
        "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.tsl.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.171.0/examples/jsm/"
      }
    }
    </script>
</head>
<body>
    <div id="loading">Fabricating Ranger Geometry & TSL Materials...</div>
    
    <script type="module">
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        import { WebGPURenderer } from "three/webgpu";
        import { color, positionLocal, float, mix, step, fract, max, add, mul, sub, sin, dot, vec3, abs, pow } from "three/tsl";

        let camera, scene, renderer, controls;

        // --- 1. TSL PROCEDURAL UTILITIES ---
        function proceduralNoise(posNode, scale) {
            const scaled = posNode.mul(scale);
            return fract(sin(dot(scaled, vec3(12.9898, 78.233, 37.719))).mul(43758.5453));
        }

        // --- 2. TSL MATERIALS ---
        function createHullMaterial() {
            const material = new THREE.MeshStandardNodeMaterial();
            const pos = positionLocal;

            const scaleX = 0.8;
            const scaleZ = 0.5;
            const gridX = step(0.96, fract(pos.x.mul(scaleX)));
            const gridZ = step(0.96, fract(pos.z.mul(scaleZ)));
            const lines = max(gridX, gridZ);

            const wear = proceduralNoise(pos, float(15.0)).mul(0.1);
            const baseWhite = color(0xeceef0);
            const dirtyWhite = color(0xd0d5da);
            const lineColor = color(0x606060);

            let finalColor = mix(baseWhite, dirtyWhite, wear);
            finalColor = mix(finalColor, lineColor, lines);

            const isNose = step(float(8.2), pos.z);
            const isRearTop = step(pos.z, float(-4.0)).mul(step(float(0.8), pos.y));
            const decals = max(isNose, isRearTop.mul(proceduralNoise(pos, float(5.0)).mul(0.5)));
            finalColor = mix(finalColor, color(0x222222), decals);

            material.colorNode = finalColor;
            material.roughnessNode = add(float(0.4), wear).add(lines.mul(0.4));
            material.metalnessNode = float(0.15);
            return material;
        }

        function createBlackTrimMaterial() {
            const material = new THREE.MeshStandardNodeMaterial();
            const wear = proceduralNoise(positionLocal, float(25.0)).mul(0.08);
            material.colorNode = color(0x151618).add(wear);
            material.roughnessNode = float(0.85).sub(wear); 
            material.metalnessNode = float(0.3);
            return material;
        }

        function createWindowMaterial() {
            const material = new THREE.MeshStandardNodeMaterial();
            material.colorNode = color(0x010203);
            material.roughnessNode = float(0.02);
            material.metalnessNode = float(0.95);
            return material;
        }

        // --- 3. GEOMETRY FABRICATION ENGINE ---
        function buildCoreHull() {
            const length = 18;
            const width = 8.5;
            const geo = new THREE.BoxGeometry(1, 1, 1, 16, 4, 32);
            const pos = geo.attributes.position;
            
            for (let i = 0; i < pos.count; i++) {
                let nx = pos.getX(i) * 2;
                let ny = pos.getY(i) * 2;
                let nz = pos.getZ(i) * 2;
                let finalZ = nz * (length / 2); 
                
                let halfWidth = 0;
                if (finalZ < -3) halfWidth = width / 2;
                else if (finalZ < 6) halfWidth = THREE.MathUtils.lerp(width / 2, 1.2, (finalZ + 3) / 9);
                else halfWidth = THREE.MathUtils.lerp(1.2, 0.3, (finalZ - 6) / 3);
                
                halfWidth *= (1.0 - Math.pow(Math.abs(nz), 4) * 0.05);
                let finalX = nx * halfWidth;

                let finalY = 0;
                if (ny > 0) {
                    if (finalZ < -4) finalY = 1.0;
                    else if (finalZ < 1) finalY = THREE.MathUtils.lerp(1.0, 2.2, (finalZ + 4) / 5);
                    else if (finalZ < 7) finalY = THREE.MathUtils.lerp(2.2, 0.4, (finalZ - 1) / 6);
                    else finalY = THREE.MathUtils.lerp(0.4, 0.1, (finalZ - 7) / 2);
                    
                    let edgeThinness = Math.pow(Math.abs(nx), 1.5);
                    let edgeHeight = THREE.MathUtils.lerp(0.8, 0.1, (finalZ + 9) / 18);
                    finalY = THREE.MathUtils.lerp(finalY, edgeHeight, edgeThinness);
                } else {
                    finalY = -0.1 + (finalZ + 9) / 18 * 0.2;
                }

                pos.setXYZ(i, finalX, finalY, finalZ);
            }
            geo.computeVertexNormals();
            return geo;
        }

        // --- 4. SHIP ASSEMBLY ---
        function createRanger() {
            const ship = new THREE.Group();
            const matHull = createHullMaterial();
            const matBlack = createBlackTrimMaterial();
            const matGlass = createWindowMaterial();

            // A. Core Body
            ship.add(new THREE.Mesh(buildCoreHull(), matHull));

            // B. Black Wing Cowlings
            const buildSideCowl = (isLeft) => {
                const cowlGroup = new THREE.Group();
                const sign = isLeft ? 1 : -1;

                const rearArm = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.8, 6.0), matBlack);
                rearArm.position.set(4.0 * sign, 0.3, -5.0);
                rearArm.rotation.y = 0.05 * sign;
                cowlGroup.add(rearArm);

                const midArm = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.5, 6.5), matBlack);
                midArm.position.set(3.0 * sign, 0.2, 0.5);
                midArm.rotation.y = -0.28 * sign;
                cowlGroup.add(midArm);

                const frontArm = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.3, 4.0), matBlack);
                frontArm.position.set(1.4 * sign, 0.1, 5.0);
                frontArm.rotation.y = -0.45 * sign;
                cowlGroup.add(frontArm);

                return cowlGroup;
            };
            ship.add(buildSideCowl(true));
            ship.add(buildSideCowl(false));

            // C. Rear Chassis
            const tail = new THREE.Mesh(new THREE.BoxGeometry(8.2, 1.4, 1.2), matBlack);
            tail.position.set(0, 0.4, -8.6);
            ship.add(tail);

            // D. Window Panes (Perfectly flushed using mathematical tangents)
            const mainSlopeAngle = Math.atan2(1.8, 6.0); 
            
            // This function perfectly embeds the windows by using the exact mathematical curve of the hull
            const placeFlushWindow = (w, h, d, x, z, rotY=0) => {
                let nz = z / 9.0;
                let halfWidth = THREE.MathUtils.lerp(4.25, 1.2, (z + 3) / 9);
                halfWidth *= (1.0 - Math.pow(Math.abs(nz), 4) * 0.05);

                let nx = Math.min(Math.abs(x) / halfWidth, 1.0);
                let centerY = THREE.MathUtils.lerp(2.2, 0.4, (z - 1) / 6);
                let edgeThinness = Math.pow(nx, 1.5);
                let edgeHeight = THREE.MathUtils.lerp(0.8, 0.1, (z + 9) / 18);
                let finalY = THREE.MathUtils.lerp(centerY, edgeHeight, edgeThinness);

                // Calculate lateral tilt dynamically
                let nx2 = Math.min((Math.abs(x) + 0.1) / halfWidth, 1.0);
                let finalY2 = THREE.MathUtils.lerp(centerY, edgeHeight, Math.pow(nx2, 1.5));
                let rotZ = Math.atan2(finalY2 - finalY, 0.1) * Math.sign(-x);

                const pane = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), matGlass);
                // Sink slightly to prevent hovering
                pane.position.set(x, finalY - h/2 + 0.02, z); 
                pane.rotation.set(mainSlopeAngle, rotY, rotZ);
                ship.add(pane);
            };

            // Main Sloped Windows
            placeFlushWindow(0.7, 0.1, 0.8, -0.8, 1.8, -0.1);
            placeFlushWindow(0.7, 0.1, 0.8,  0.0, 1.8,  0);
            placeFlushWindow(0.7, 0.1, 0.8,  0.8, 1.8,  0.1);
            
            placeFlushWindow(0.9, 0.1, 0.9, -1.0, 3.0, -0.15);
            placeFlushWindow(0.9, 0.1, 0.9,  0.0, 3.0,  0);
            placeFlushWindow(0.9, 0.1, 0.9,  1.0, 3.0,  0.15);
            
            placeFlushWindow(1.0, 0.1, 1.0, -1.2, 4.2, -0.2);
            placeFlushWindow(1.0, 0.1, 1.0,  0.0, 4.2,  0);
            placeFlushWindow(1.0, 0.1, 1.0,  1.2, 4.2,  0.2);

            // Roof Windows (Manually placed due to inverse up-slope)
            const roofAngle = -Math.atan2(1.2, 5.0); // Tilts backward
            const placeRoofWindow = (x, z) => {
                const p = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.1, 1.0), matGlass);
                p.position.set(x, 1.95, z);
                p.rotation.set(roofAngle, 0, x > 0 ? -0.1 : 0.1);
                ship.add(p);
            };
            placeRoofWindow(-0.7, 0.2);
            placeRoofWindow(0.7, 0.2);

            // E. REAR Landing Gear (Attached and cohesive)
            const gearGroup = new THREE.Group();
            
            // Vertical main shock securely attached to hull
            const shock = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.05, 1.8, 8), matHull);
            shock.position.set(0, -1.5, 0);
            gearGroup.add(shock);

            // Diagonal strut mechanically joining shock to hull
            const strut = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 1.8, 8), matBlack);
            strut.rotation.x = -Math.PI / 4;
            strut.position.set(0, -0.8, -0.6); 
            gearGroup.add(strut);

            // Joint block
            const joint = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.4, 0.4), matBlack);
            joint.position.set(0, -0.6, 0);
            gearGroup.add(joint);

            // Skid foot
            const skid = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.15, 2.2), matBlack);
            skid.position.set(0, -2.4, 0);
            gearGroup.add(skid);

            gearGroup.position.set(3.2, 0.2, -4.5);
            ship.add(gearGroup);

            const gearL = gearGroup.clone();
            gearL.position.set(-3.2, 0.2, -4.5);
            ship.add(gearL);

            // F. FRONT Landing Gear (Newly added)
            const frontGear = new THREE.Group();
            const fShock = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.04, 1.6, 8), matHull);
            fShock.position.set(0, -1.4, 0);
            frontGear.add(fShock);

            const fStrut = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 1.2, 8), matBlack);
            fStrut.rotation.x = Math.PI / 4; 
            fStrut.position.set(0, -0.8, 0.4); 
            frontGear.add(fStrut);

            const fSkid = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.15, 1.5), matBlack);
            fSkid.position.set(0, -2.2, 0);
            frontGear.add(fSkid);

            // Y is elevated by 0.6 to perfectly offset the ship's nose-down pitch
            frontGear.position.set(0, 0.6, 5.5); 
            ship.add(frontGear);

            // G. Final Alignment
            ship.rotation.x = -0.04; // Nose down resting pitch
            ship.position.y = 2.22;  // Mathematically calculated so skids sit exactly at Y=0
            
            scene.add(ship);

            // H. Ground Floor
            const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.6 });
            const shadow = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), shadowMat);
            shadow.rotation.x = -Math.PI / 2;
            shadow.position.y = -0.01;
            scene.add(shadow);
        }

        // --- 5. INITIALIZATION & LOOP ---
        function setupLighting() {
            const keyLight = new THREE.DirectionalLight(0xfff5e6, 4.0);
            keyLight.position.set(-12, 18, 10);
            scene.add(keyLight);

            const fillLight = new THREE.DirectionalLight(0x88bbff, 1.5);
            fillLight.position.set(15, 6, -12);
            scene.add(fillLight);

            const bounceLight = new THREE.DirectionalLight(0xffccaa, 1.0);
            bounceLight.position.set(0, -10, 5); 
            scene.add(bounceLight);
            
            scene.add(new THREE.AmbientLight(0x22222a, 0.8));
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            controls.update();
            renderer.render(scene, camera);
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x06070a);
            scene.fog = new THREE.FogExp2(0x06070a, 0.015);

            camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(-14, 5, 12); 

            renderer = new WebGPURenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.target.set(0, 1, 0);

            setupLighting();
            createRanger();

            document.getElementById("loading").style.display = "none";
            window.addEventListener("resize", onWindowResize);
            renderer.setAnimationLoop(animate);
        }

        init();
    </script>
</body>
</html>
